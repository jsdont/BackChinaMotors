app = "cm-backend-daniyal"
primary_region = "ams"
console_command = "/code/manage.py shell"

# Прогоняем миграции на каждом деплое, до выката новой версии. Без этого
# fly deploy не применяет миграции и новые таблицы (Expense, DealStage,
# DealMedia, DealActivity и т.д.) не создаются → 500 в админке/API.
[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
